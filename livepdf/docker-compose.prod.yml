version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: livepdf-postgres-prod
    environment:
      POSTGRES_DB: livepdf
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_user
      - db_password
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    restart: always
    networks:
      - livepdf-network-prod

  redis:
    image: redis:7-alpine
    container_name: livepdf-redis-prod
    restart: always
    volumes:
      - redisdata-prod:/data
    networks:
      - livepdf-network-prod

  api:
    image: ${API_IMAGE:-kpchiragguptha/livepdf-server:latest}
    container_name: livepdf-api-prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=livepdf
      - DB_USER_FILE=/run/secrets/db_user
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - CLIENT_URL=${CLIENT_URL:-http://54.87.199.110}
      - DIFF_SERVICE_URL=http://python-diff:8001
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
    secrets:
      - db_user
      - db_password
      - jwt_secret
    depends_on:
      - postgres
      - redis
    restart: always
    networks:
      - livepdf-network-prod
    volumes:
      - uploads-data:/app/uploads

  worker:
    image: ${API_IMAGE:-kpchiragguptha/livepdf-server:latest}
    container_name: livepdf-worker-prod
    command: node worker.js
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=livepdf
      - DB_USER_FILE=/run/secrets/db_user
      - DB_PASSWORD_FILE=/run/secrets/db_password
      - REDIS_URL=redis://redis:6379
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
    secrets:
      - db_user
      - db_password
    depends_on:
      - postgres
      - redis
    restart: always
    networks:
      - livepdf-network-prod
    volumes:
      - uploads-data:/app/uploads

  python-diff:
    image: ${PYTHON_IMAGE:-kpchiragguptha/livepdf-python:latest}
    container_name: livepdf-python-diff-prod
    environment:
      - PORT=8001
    restart: always
    volumes:
      - uploads-data:/server/uploads
    networks:
      - livepdf-network-prod

  client:
    image: ${CLIENT_IMAGE:-kpchiragguptha/livepdf-client:latest}
    container_name: livepdf-client-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    networks:
      - livepdf-network-prod

volumes:
  pgdata-prod:
  redisdata-prod:
  uploads-data:

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

networks:
  livepdf-network-prod:
    driver: bridge
