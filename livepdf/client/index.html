<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="rfc3JUygCGRRXTjR_2ro6sC8RodURFpPZ-ppYcOhjLM" />
    <title>LivePDF</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'%3E%3Cpath d='M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 6h-4v2h4v2h-4v2h4v2H9V7h6v2z'/%3E%3C/svg%3E" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      input, button, select, textarea { font-family: inherit; }

      @media (max-width: 768px) {
        .responsive-header {
          flex-wrap: wrap !important;
          height: auto !important;
          min-height: 56px !important;
          padding: 8px 1rem !important;
          gap: 8px !important;
        }
        .responsive-name {
          display: none !important;
        }
        .responsive-body {
          padding: 1.5rem 1rem !important;
        }
        .responsive-card-actions {
          flex-wrap: wrap !important;
          gap: 8px !important;
        }
        .responsive-card-btn {
          flex: 1 1 calc(50% - 4px) !important;
          padding: 8px 6px !important;
        }
        .responsive-card-btn-delete {
          flex: 1 1 100% !important;
          margin-top: 4px !important;
        }
        .responsive-toolbar {
          padding: 8px 12px !important;
          gap: 8px !important;
        }
        .responsive-toolbar-title {
          display: none !important;
        }
        .responsive-toolbar-divider {
          display: none !important;
        }
        .responsive-toolbar-controls {
          gap: 8px !important;
          justify-content: space-between !important;
        }
        .responsive-toolbar-group {
          margin: 0 !important;
        }
        .responsive-search-wrap {
          flex: 1 1 100% !important;
          margin: 4px 0 !important;
        }
        .responsive-search-input-wrapper {
          width: 100% !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
